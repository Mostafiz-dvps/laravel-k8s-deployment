name: Callable Docker Push

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  docker-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            mostafiz01/laravel-k8s:${{ inputs.image_tag }}
            mostafiz01/laravel-k8s:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    needs: docker-push
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mostafiz01/laravel-k8s:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  security-scan:
    needs: docker-push
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mostafiz01/laravel-k8s:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
