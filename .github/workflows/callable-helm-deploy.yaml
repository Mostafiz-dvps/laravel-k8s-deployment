name: Callable Helm Deploy

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
      environment:
        required: true
        type: string
    secrets:
      APP_KEY:
        required: true

jobs:
  helm-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Helm Lint
        run: helm lint ./helm/laravel

      - name: Deploy
        run: |
          helm upgrade --install laravel ./helm/laravel \
            --namespace laravel \
            --create-namespace \
            --set image.tag="${{ inputs.image_tag }}" \
            --set secret.appKey="${{ secrets.APP_KEY }}" \
            --atomic \
            --timeout 5m
