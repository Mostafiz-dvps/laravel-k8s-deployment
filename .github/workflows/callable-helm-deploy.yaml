name: Callable Helm Deploy

on:
  workflow_call:
    inputs:
      ENV_VARIABLES_PATH:
        required: true
        type: string
      environment:
        required: true
        type: string
    secrets:
      APP_KEY:
        required: true

jobs:
  helm-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Environment Variables
        uses: ./.github/actions/setvars
        with:
          varFilePath: ${{ inputs.ENV_VARIABLES_PATH }}

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Helm Lint
        run: helm lint ./${{ env.HELM_TEMPLATE }}

      - name: Deploy
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./${{ env.HELM_TEMPLATE }} \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set image.tag="${{ env.IMAGE_VERSION }}" \
            --set secret.appKey="${{ secrets.APP_KEY }}" \
            --set ingress.host="${{ env.INGRESS_HOST }}" \
            --atomic \
            --timeout 5m
