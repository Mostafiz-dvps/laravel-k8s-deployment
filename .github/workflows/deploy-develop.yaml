name: Deploy to Dev

on:
  push:
    branches: [develop]
    paths:
      - 'app/**'

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v3
      - run: helm lint ./helm/laravel

  docker-push:
    needs: lint
    uses: ./.github/workflows/callable-docker-push.yaml
    with:
      ENV_VARIABLES_PATH: ".github/variables/laravel.env"
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
