apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "laravel.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "laravel.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "laravel.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
  egress:
    - {}
