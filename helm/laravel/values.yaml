replicaCount: 2

image:
  repository: mostafiz01/laravel-k8s
  tag: "1.0.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: "laravel-app"

namespace: laravel

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: laravel-test.local
  tls: true
  tlsSecret: laravel-tls
  certIssuer: selfsigned-issuer
  sslRedirect: "false"
  forceSSLRedirect: "false"

app:
  env: production
  debug: "false"
  url: "https://laravel-test.local"
  logChannel: stderr
  sessionDriver: file

secret:
  appKey: ""

storage:
  enabled: true
  size: 1Gi
  storageClassName: local-path
  mountPath: /var/www/html/storage

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  cpuUtilization: 70

pdb:
  enabled: true
  minAvailable: 1

imagePullSecrets: []

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001

livenessProbe:
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

